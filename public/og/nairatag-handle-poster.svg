    <line x1="42" y1="92" x2="760" y2="92" class="line"/>

    <rect x="986" y="116" width="162" height="48" fill="none" stroke="#F05A1A" stroke-width="3"/>
    <circle cx="1012" cy="140" r="13" fill="none" stroke="#F05A1A" stroke-width="3"/>
    <path d="M1006 140 L1011 145 L1020 135" stroke="#F05A1A" stroke-width="3.5" fill="none"/>
    <text x="1032" y="137" class="label ink">VERIFIED</text>
    <text x="1032" y="152" class="label ink">HANDLE</text>

    <text x="36" y="248" class="hero orange">&#8358;femi</text>
    <text x="560" y="338" class="hero2 orange">official</text>

    <text x="42" y="268" class="copy ink">SEND MONEY.</text>
    <text x="42" y="292" class="copy ink">NO ACCOUNT NUMBER.</text>
    <text x="42" y="316" class="copy ink">JUST </text>
    <text x="96" y="316" class="copy orange">#FEMIOFFICIAL.</text>

    <text x="990" y="272" class="copy ink">FAST</text>
    <text x="990" y="296" class="copy ink">SECURE</text>
    <text x="990" y="320" class="copy ink">SIMPLE</text>
    <text x="1070" y="320" class="micro orange">TM</text>

    <rect x="344" y="166" width="540" height="304" fill="url(#portraitGrad)"/>
