<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill:#F4EFE6; }
      .ink { fill:#0B0B0B; }
      .orange { fill:#F05A1A; }
      .line { stroke:#111111; stroke-width:2; }
      .meta { font-family: Arial, Helvetica, sans-serif; font-size:18px; font-weight:900; letter-spacing:-0.6px; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size:10px; font-weight:800; letter-spacing:0.8px; }
      .micro { font-family: Arial, Helvetica, sans-serif; font-size:9px; font-weight:800; letter-spacing:1.2px; }
      .copy { font-family: Arial, Helvetica, sans-serif; font-size:20px; font-weight:900; letter-spacing:-0.4px; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size:13px; font-weight:900; letter-spacing:0.4px; }
      .hero { font-family: Arial Black, Impact, Helvetica, sans-serif; font-size:168px; font-weight:900; letter-spacing:-10px; }
      .hero2 { font-family: Arial Black, Impact, Helvetica, sans-serif; font-size:154px; font-weight:900; letter-spacing:-8px; }
      .footer { font-family: Arial, Helvetica, sans-serif; font-size:14px; font-weight:900; letter-spacing:-0.2px; }
    </style>

    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>

    <clipPath id="cardClip">
      <rect x="18" y="18" width="1164" height="594" rx="18"/>
    </clipPath>

    <linearGradient id="portraitGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#191919"/>
      <stop offset="100%" stop-color="#0C0C0C"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0A0A0A"/>
  <g clip-path="url(#cardClip)">
    <rect x="18" y="18" width="1164" height="594" rx="18" class="bg"/>
    <rect x="18" y="18" width="1164" height="594" rx="18" fill="none" stroke="#F05A1A" stroke-width="14"/>
    <rect x="18" y="18" width="1164" height="594" filter="url(#rough)" opacity="0.65"/>

    <text x="42" y="54" class="meta ink">NAIRATAG</text>
    <text x="42" y="74" class="meta ink">HANDLE</text>
    <circle cx="205" cy="50" r="13" fill="none" stroke="#111111" stroke-width="2"/>
    <circle cx="205" cy="50" r="6" fill="none" stroke="#111111" stroke-width="2"/>

    <text x="986" y="54" class="meta ink">NAIRATAG.NG</text>
