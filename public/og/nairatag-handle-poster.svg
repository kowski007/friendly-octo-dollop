        <rect x="8" width="2" height="122" fill="#111"/>
        <rect x="14" width="6" height="122" fill="#111"/>
        <rect x="26" width="3" height="122" fill="#111"/>
        <rect x="34" width="8" height="122" fill="#111"/>
        <rect x="48" width="2" height="122" fill="#111"/>
      </g>
      <text x="0" y="160" class="tiny orange">NG</text>
      <text x="0" y="176" class="tiny orange">2026</text>
      <text transform="translate(-2 144) rotate(-90)" class="micro ink">YOUR NAME. YOUR MONEY. YOUR WAY.</text>
    </g>

    <line x1="42" y1="548" x2="1154" y2="548" class="line"/>

    <rect x="42" y="566" width="48" height="48" rx="12" class="ink"/>
    <text x="56" y="599" font-family="Arial Black, Impact" font-size="30" fill="#FFF">&#8358;</text>
    <line x1="118" y1="566" x2="118" y2="614" class="line"/>

    <text x="146" y="585" class="footer ink">PAY ANYONE</text>
    <text x="146" y="602" class="footer ink">WITH JUST A</text>
    <text x="146" y="619" class="footer orange">NAIRATAG.</text>

    <circle cx="620" cy="590" r="22" fill="none" stroke="#111" stroke-width="2"/>
    <line x1="620" y1="568" x2="620" y2="612" class="line"/>
    <line x1="598" y1="590" x2="642" y2="590" class="line"/>

    <text x="662" y="585" class="footer ink">NAIRATAG</text>
