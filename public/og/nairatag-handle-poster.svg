      <rect x="12" y="10" width="54" height="18" fill="#FFFFFF" opacity="0.16" transform="rotate(-12 12 10)"/>
      <rect x="18" y="18" width="24" height="24" rx="7" class="ink"/>
      <text x="23" y="36" font-family="Arial Black, Impact" font-size="16" fill="#FFF">&#8358;</text>
      <text x="18" y="60" class="copy ink">SCAN</text>
      <text x="18" y="84" class="copy ink">TO PAY</text>

      <rect x="18" y="96" width="126" height="126" fill="#FFF" stroke="#111" stroke-width="4"/>
      <rect x="28" y="106" width="28" height="28" fill="none" stroke="#111" stroke-width="7"/>
      <rect x="106" y="106" width="28" height="28" fill="none" stroke="#111" stroke-width="7"/>
      <rect x="28" y="184" width="28" height="28" fill="none" stroke="#111" stroke-width="7"/>
      <rect x="64" y="112" width="12" height="12" fill="#111"/>
      <rect x="78" y="136" width="20" height="20" fill="#111"/>
      <rect x="100" y="162" width="14" height="14" fill="#111"/>
      <rect x="70" y="182" width="18" height="18" fill="#111"/>
      <rect x="58" y="144" width="36" height="36" rx="10" fill="#D84D11"/>
      <text x="68" y="170" font-family="Arial Black, Impact" font-size="24" fill="#FFF">&#8358;</text>

